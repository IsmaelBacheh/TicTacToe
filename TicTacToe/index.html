<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Welcome to Tic-Tac-Toe!</h1>
    <div class="players-info-panel">
        <div class="player-panel">
            <div class="player-name">Player 1</div>
            <br>
            <div class="player-symbol x">X</div>
            <br>
            <div class="player-score"></div>
            <br>
            <div class="player-status"></div>
        </div>
        <div class="player-panel">
            <div class="player-name">Player 2</div>
            <br>
            <div class="player-symbol o">O</div>
            <br>
            <div class="player-score"></div>
            <br>
            <div class="player-status"></div>
        </div>
    </div>

    <div class="gameLocation">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button class="reset-btn">Restart Game</button>
    <footer>
        <p>
            Developed by <strong>Ismael DJIBRIL</strong> • 
            <a href="https://github.com/IsmaelBacheh" target="_blank" rel="noopener noreferrer">
                GitHub Profile
            </a> • 
            Built with HTML, CSS, and JavaScript
        </p>
    </footer>
</body>
</html>
